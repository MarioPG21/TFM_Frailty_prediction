# =============================================================================
# server.properties — configuración del broker Kafka en modo KRaft
#
# KRaft (Kafka Raft) elimina la dependencia de ZooKeeper: el propio broker
# actúa como controlador del cluster. Para un entorno de desarrollo de un solo
# broker, esto reduce un servicio entero respecto a la arquitectura clásica.
#
# Este broker cumple dos roles a la vez (broker + controller) porque es el
# único nodo del cluster. En producción multi-nodo, los roles se separarían.
# =============================================================================

# Roles que desempeña este nodo: almacena datos (broker) y coordina el
# cluster (controller). En un cluster de un solo nodo, ambos en el mismo proceso.
process.roles=broker,controller

# Identificador único de este nodo dentro del cluster.
node.id=1

# Quórum de controladores: define qué nodos participan en la elección de
# líder. Con un solo nodo, el quórum es él mismo.
controller.quorum.voters=1@kafka:9093

# Directorio donde Kafka almacena los logs de los topics (los mensajes).
log.dirs=/var/lib/kafka/data

# -----------------------------------------------------------------------------
# Listeners — los puntos de entrada de red del broker
#
# PLAINTEXT  (9092): comunicación interna entre contenedores Docker.
#                    Los servicios dentro de la red (Spark) usan este.
# EXTERNAL   (9094): acceso desde el host (clientes fuera de Docker).
# CONTROLLER (9093): comunicación interna del protocolo KRaft.
# -----------------------------------------------------------------------------
listeners=PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093

# Direcciones que el broker anuncia a los clientes para que se reconecten.
# CLAVE: el listener interno anuncia 'kafka' (nombre de servicio Docker);
# el externo anuncia 'localhost' para que funcione desde el host en cualquier
# máquina. En el compose de referencia esto estaba clavado a una IP privada
# concreta, lo que rompía el acceso externo en cualquier otra máquina.
advertised.listeners=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094

# Mapeo de cada listener a su protocolo de seguridad. Todos en PLAINTEXT
# (sin cifrado) porque es un entorno de desarrollo local aislado.
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT

# Listener que usa el protocolo de controlador KRaft.
controller.listener.names=CONTROLLER

# Listener que los brokers usan para comunicarse entre sí.
inter.broker.listener.name=PLAINTEXT

# -----------------------------------------------------------------------------
# Configuración de topics y replicación
# Todos los factores de replicación a 1 porque hay un solo broker:
# no es posible replicar en más nodos de los que existen.
# -----------------------------------------------------------------------------
num.partitions=3
auto.create.topics.enable=true

offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
group.initial.rebalance.delay.ms=0